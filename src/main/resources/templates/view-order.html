<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Order Details | ReWear</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fa;
}

.navbar{
    background:#198754;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.product-img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:15px;
}

.price{
    color:#198754;
    font-size:30px;
    font-weight:bold;
}

footer{
    background:#198754;
    color:white;
    padding:25px;
    margin-top:50px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand"
th:href="@{/my-orders}">

<i class="bi bi-arrow-left-circle"></i>

Back to Orders

</a>

<span class="navbar-text text-white">

<i class="bi bi-bag-check-fill"></i>

Order Details

</span>

</div>

</nav>

<div class="container py-5">

<div class="card p-4">

<div class="row">

<div class="col-lg-5">

<img
th:src="@{'/uploads/' + ${order.product.imageName}}"
class="product-img"
alt="Product">

</div>

<div class="col-lg-7">

<h2
th:text="${order.product.productName}">
Product
</h2>

<hr>

<p>

<b>Brand :</b>

<span
th:text="${order.product.brand}"></span>

</p>

<p>

<b>Category :</b>

<span
th:text="${order.product.category}"></span>

</p>

<p>

<b>Size :</b>

<span
th:text="${order.product.size}"></span>

</p>

<p>

<b>Condition :</b>

<span
th:text="${order.product.condition}"></span>

</p>

<p>

<b>Quantity :</b>

<span class="badge bg-primary"
th:text="${order.quantity}">
1
</span>

</p>

<p class="price">

₹<span
th:text="${order.product.price}">
0
</span>

</p>

<hr>

<h4>Customer Details</h4>

<p>

<b>Name :</b>

<span
th:text="${order.customerName}"></span>

</p>

<p>

<b>Email :</b>

<span
th:text="${order.email}"></span>

</p>

<p>

<b>Phone :</b>

<span
th:text="${order.phone}"></span>

</p>

<p>

<b>Address :</b>

<span
th:text="${order.address}"></span>

</p>

<p>

<b>City :</b>

<span
th:text="${order.city}"></span>

</p>

<p>

<b>Pincode :</b>

<span
th:text="${order.pincode}"></span>

</p>

<p>

<b>Payment :</b>

<span class="badge bg-success"
th:text="${order.paymentMethod}">
COD
</span>

</p>

<p>

<b>Status :</b>

<span class="badge bg-primary"
th:text="${order.orderStatus}">
Placed
</span>

</p>

<p>

<b>Order Date :</b>

<span
th:text="${#temporals.format(order.orderDate,'dd MMM yyyy HH:mm')}">
</span>

</p>

<div class="mt-4">

<a th:href="@{/my-orders}"
class="btn btn-success">

<i class="bi bi-arrow-left"></i>

Back to Orders

</a>

<a
th:href="@{/marketplace}"
class="btn btn-outline-success">

Continue Shopping

</a>

</div>

</div>

</div>

</div>

</div>

<footer class="text-center">

<h4>

♻ ReWear

</h4>

<p>

Giving Every Thread a Second Life.

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
