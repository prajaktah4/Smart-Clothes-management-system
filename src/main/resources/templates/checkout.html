<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout | ReWear</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{background:#f5f7fa}
.navbar{background:#198754}
.card{border:none;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.summary{position:sticky;top:90px}
.price{color:#198754;font-weight:700;font-size:24px}
footer{background:#198754;color:#fff;padding:25px;margin-top:40px}
</style>
</head>
<body>

<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand" th:href="@{/cart}">
<i class="bi bi-arrow-left-circle"></i> Back to Cart
</a>
<span class="navbar-text text-white">
<i class="bi bi-bag-check-fill"></i> Checkout
</span>
</div>
</nav>

<div class="container py-5">
<div class="row">

<div class="col-lg-8">
<div class="card p-4">
<h3 class="mb-4">Delivery Details</h3>

<form th:action="@{/placeOrder}" method="post">

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" name="customerName" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="text" class="form-control" name="phone" required>
</div>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" name="email" required>
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<textarea class="form-control" rows="3" name="address" required></textarea>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">City</label>
<input type="text" class="form-control" name="city" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Pincode</label>
<input type="text" class="form-control" name="pincode" required>
</div>
</div>

<div class="mb-4">
<label class="form-label">Payment Method</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="paymentMethod" value="Cash on Delivery" checked>
<label class="form-check-label">Cash on Delivery</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="paymentMethod" value="UPI">
<label class="form-check-label">UPI</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="paymentMethod" value="Card">
<label class="form-check-label">Debit / Credit Card</label>
</div>

</div>

<button type="submit"
        class="btn btn-success btn-lg w-100">

    <i class="bi bi-bag-check-fill"></i>

    Place Order

</button>

<a th:href="@{/cart}"
   class="btn btn-outline-secondary w-100 mt-3">

    Cancel

</a>

</form>
</div>
</div>

<h3>Order Summary</h3>

<hr>

<div th:each="cart : ${cartItems}" class="mb-3">

    <div class="d-flex justify-content-between">

        <div>

            <b th:text="${cart.product.productName}">
                Product
            </b>

            <br>

            <small>
                Qty :
                <span th:text="${cart.quantity}"></span>
            </small>

        </div>

        <div class="price">

            ₹<span th:text="${cart.product.price}"></span>

        </div>

    </div>

    <hr>

</div>

<div class="d-flex justify-content-between">

    <h5>Total Items</h5>

    <h5 th:text="${cartItems.size()}"></h5>

</div>

<div class="d-flex justify-content-between">

    <h4>Total Price</h4>

    <h4 class="text-success">

        ₹<span th:text="${totalPrice}"></span>

    </h4>

</div>

<hr>

<hr>

<div class="d-flex justify-content-between">
<span>Total Price</span>
<span class="price">
₹<span th:text="${totalPrice}">0</span>
</span>
</div>

<hr>

<a th:href="@{/cart}" class="btn btn-outline-success w-100">
Back to Cart
</a>

</div>
</div>

</div>
</div>

<footer class="text-center">
<h5>♻ ReWear</h5>
<p>Giving Every Thread a Second Life.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
