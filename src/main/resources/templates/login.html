<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReWear | Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#e8f5e9,#ffffff);
            min-height:100vh;
            display:flex;
            align-items:center;
        }

        .login-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,.12);
        }

        .left-panel{
            background:linear-gradient(135deg,#198754,#2fbf71);
            color:white;
            padding:50px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-login{
            border-radius:12px;
            padding:12px;
            font-weight:600;
        }

        .input-group-text{
            background:white;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card login-card">

                <div class="row g-0">

                    <!-- Left Panel -->

                    <div class="col-lg-5 left-panel d-flex align-items-center">

                        <div>

                            <h1>♻ ReWear</h1>

                            <h3 class="fw-bold mt-3">
                                Welcome Back!
                            </h3>

                            <p>
                                Login to continue your sustainable fashion journey.
                            </p>

                            <hr>

                            <p>✔ Buy Clothes</p>
                            <p>✔ Sell Clothes</p>
                            <p>✔ Donate Clothes</p>
                            <p>✔ Exchange Clothes</p>

                        </div>

                    </div>

                    <!-- Login Form -->

                    <div class="col-lg-7">

                        <div class="p-5">

                            <h2 class="text-success fw-bold">
                                Login
                            </h2>

                            <p class="text-muted">
                                Enter your email and password.
                            </p>

                            <!-- Success Message -->
                            <div th:if="${success}" class="alert alert-success">
                                <span th:text="${success}"></span>
                            </div>

                            <!-- Error Message -->
                            <div th:if="${error}" class="alert alert-danger">
                                <span th:text="${error}"></span>
                            </div>

                            <form th:action="@{/login}" method="post">

                                <!-- Email -->

                                <div class="mb-3">

                                    <label>Email Address</label>

                                    <div class="input-group">

                                        <span class="input-group-text">

                                            <i class="bi bi-envelope-fill"></i>

                                        </span>

                                        <input
                                                type="email"
                                                name="email"
                                                class="form-control"
                                                placeholder="Enter Email"
                                                required>

                                    </div>

                                </div>

                                <!-- Password -->

                                <div class="mb-3">

                                    <label>Password</label>

                                    <div class="input-group">

                                        <span class="input-group-text">

                                            <i class="bi bi-lock-fill"></i>

                                        </span>

                                        <input
                                                type="password"
                                                id="password"
                                                name="password"
                                                class="form-control"
                                                placeholder="Enter Password"
                                                required>

                                        <span class="input-group-text"
                                              onclick="togglePassword()"
                                              style="cursor:pointer;">

                                            <i id="eyeIcon"
                                               class="bi bi-eye"></i>

                                        </span>

                                    </div>

                                </div>

                                <div class="d-flex justify-content-between mb-4">

                                    <div class="form-check">

                                        <input
                                                class="form-check-input"
                                                type="checkbox"
                                                name="remember-me">

                                        <label class="form-check-label">
                                            Remember Me
                                        </label>

                                    </div>

                                    <a th:href="@{/forgot-password}">
                                        Forgot Password?
                                    </a>

                                </div>

                                <button class="btn btn-success w-100 btn-login">

                                    <i class="bi bi-box-arrow-in-right"></i>

                                    Login

                                </button>

                            </form>

                            <hr>

                            <div class="text-center">

                                Don't have an account?

                                <a th:href="@{/register}" class="fw-bold">

                                    Register

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

let password=document.getElementById("password");
let eye=document.getElementById("eyeIcon");

if(password.type==="password"){

password.type="text";
eye.className="bi bi-eye-slash";

}else{

password.type="password";
eye.className="bi bi-eye";

}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
