<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Uploads | ReWear</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

.navbar{
    background:#198754;
}

.page-title{
    font-weight:bold;
    color:#198754;
}

.card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    height:220px;
    object-fit:cover;
}

.price{
    font-size:24px;
    font-weight:bold;
    color:#198754;
}

.badge-status{
    font-size:14px;
    padding:8px 14px;
}

footer{
    margin-top:60px;
    background:#198754;
    color:white;
    padding:30px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold"
th:href="@{/user-dashboard}">

<i class="bi bi-arrow-left-circle"></i>

Dashboard

</a>

<div>

<a class="btn btn-light me-2"
th:href="@{/upload-clothes}">

<i class="bi bi-cloud-upload"></i>

Upload New

</a>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="page-title text-center mb-5">

📦 My Uploaded Clothes

</h2>

<div class="row g-4"

th:if="${!#lists.isEmpty(products)}">

<div class="col-lg-4 col-md-6"

th:each="product : ${products}">

<div class="card h-100">

<img
th:src="@{'/uploads/' + ${product.imageName}}"
class="card-img-top">

<div class="card-body">

<h4
th:text="${product.productName}">
Product Name
</h4>

<p>

<b>Brand :</b>

<span th:text="${product.brand}"></span>

</p>

<p>

<b>Category :</b>

<span th:text="${product.category}"></span>

</p>

<p>

<b>Size :</b>

<span th:text="${product.size}"></span>

</p>

<p>

<b>Condition :</b>

<span th:text="${product.condition}"></span>

</p>

<p>

<b>Purpose :</b>

<span th:text="${product.purpose}"></span>

</p>

<div class="price">

₹<span th:text="${product.price}"></span>

</div>

<div class="mt-3">

<span
class="badge rounded-pill bg-success badge-status"

th:text="${product.status}">

Available

</span>

</div>

<div class="d-grid gap-2 mt-4">

<a
th:href="@{'/viewProduct/' + ${product.productId}}"
class="btn btn-primary">

<i class="bi bi-eye-fill"></i>

View

</a>

<a
th:href="@{'/edit-product/' + ${product.productId}}"
class="btn btn-warning">

<i class="bi bi-pencil-fill"></i>

Edit

</a>

<a
th:href="@{'/delete-product/' + ${product.productId}}"
class="btn btn-danger"
onclick="return confirm('Delete this product?')">

<i class="bi bi-trash-fill"></i>

Delete

</a>

<a
th:href="@{'/mark-sold/' + ${product.productId}}"
class="btn btn-success">

<i class="bi bi-check-circle-fill"></i>

Mark as Sold

</a>

</div>

</div>

</div>

</div>

</div>

<!-- Empty -->

<div
class="text-center p-5"
th:if="${#lists.isEmpty(products)}">

<img
src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png"
width="170">

<h3 class="mt-4">

No Uploaded Clothes

</h3>

<p>

Start selling your clothes today.

</p>

<a
th:href="@{/upload-clothes}"
class="btn btn-success">

Upload Clothes

</a>

</div>

</div>

<footer class="text-center">

<h4>

♻ ReWear

</h4>

<p>

Giving Every Thread a Second Life.

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
