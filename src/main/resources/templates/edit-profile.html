<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Profile | ReWear</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fa;
}

.navbar{
    background:#198754;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand"
th:href="@{/profile}">

<i class="bi bi-arrow-left-circle"></i>

Back

</a>

<span class="navbar-text text-white">

Edit Profile

</span>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card">

<div class="card-body p-5">

<h2 class="text-center mb-4">

Edit Your Profile

</h2>

<form
th:action="@{/update-profile}"
th:object="${user}"
method="post"
>


<input type="hidden" th:field="*{id}">

<input type="hidden" th:field="*{password}">

<input type="hidden" th:field="*{role}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input
type="text"
th:field="*{name}"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
th:field="*{email}"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Mobile</label>

<input
type="text"
th:field="*{mobile}"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Gender</label>

<select th:field="*{gender}" class="form-select">

    <option value="Male">Male</option>

    <option value="Female">Female</option>

    <option value="Other">Other</option>

</select>
</div>

<div class="col-12 mb-3">
	

<label>Address</label>

<textarea
th:field="*{address}"
class="form-control"
rows="3"></textarea>

</div>

<div class="col-md-6 mb-3">

<label>City</label>

<input
type="text"
th:field="*{city}"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Pincode</label>

<input
type="text"
th:field="*{pincode}"
class="form-control"
maxlength="6"
required>

</div>

</div>

<div class="text-center mt-4">

	<button
	type="submit"
	class="btn btn-success btn-lg">

<i class="bi bi-check-circle-fill"></i>

Save Changes

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
