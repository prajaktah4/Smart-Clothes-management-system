<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ReWear | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#e8f5e9,#ffffff);
    min-height:100vh;
}

.register-card{
    border:none;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}

.left-side{
    background:linear-gradient(135deg,#198754,#34c759);
    color:white;
    border-radius:20px 0 0 20px;
}

.logo{
    font-size:45px;
}

.form-control,
.form-select{
    border-radius:10px;
}

.btn-register{
    border-radius:10px;
    padding:12px;
    font-weight:600;
}

.feature i{
    margin-right:10px;
}

@media(max-width:991px){

.left-side{
border-radius:20px 20px 0 0;
}

}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card register-card overflow-hidden">

<div class="row g-0">

<!-- LEFT -->

<div class="col-lg-5 left-side d-flex align-items-center">

<div class="p-5">

<div class="logo mb-3">♻</div>

<h2 class="fw-bold">Welcome to ReWear</h2>

<p class="mt-3">

Giving Every Thread a Second Life.

Buy • Sell • Donate • Exchange Clothes

</p>

<div class="feature mt-4">

<p><i class="bi bi-check-circle-fill"></i>Buy Pre-loved Clothes</p>

<p><i class="bi bi-check-circle-fill"></i>Sell Clothes</p>

<p><i class="bi bi-check-circle-fill"></i>Donate Easily</p>

<p><i class="bi bi-check-circle-fill"></i>Eco Friendly Fashion</p>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-7">

<div class="p-5">

<h2 class="text-success fw-bold">

Create Account

</h2>

<p class="text-muted">

Join ReWear Today

</p>

<!-- Success -->

<div th:if="${success}" class="alert alert-success">

<span th:text="${success}"></span>

</div>

<!-- Error -->

<div th:if="${error}" class="alert alert-danger">

<span th:text="${error}"></span>

</div>

<form
th:action="@{/register}"
th:object="${user}"
method="post">

<div class="row">

<div class="col-md-6 mb-3">

<label>Full Name</label>

<input
type="text"
th:field="*{name}"
class="form-control"
placeholder="Enter Name"
required>

</div>

<div class="col-md-6 mb-3">

<label>Mobile</label>

<input
type="text"
th:field="*{mobile}"
class="form-control"
placeholder="9876543210"
maxlength="10"
required>

</div>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
th:field="*{email}"
class="form-control"
placeholder="example@gmail.com"
required>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Password</label>

<input
type="password"
th:field="*{password}"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Confirm Password</label>

<input
type="password"
th:field="*{confirmPassword}"
class="form-control"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Gender</label>

<select
th:field="*{gender}"
class="form-select"
required>

<option value="">Select Gender</option>

<option value="Male">Male</option>

<option value="Female">Female</option>

<option value="Other">Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>City</label>

<input
type="text"
th:field="*{city}"
class="form-control"
required>

</div>

</div>

<div class="mb-3">

<label>Address</label>

<textarea
th:field="*{address}"
class="form-control"
rows="3"></textarea>

</div>

<div class="mb-3">

<label>Pincode</label>

<input
type="text"
th:field="*{pincode}"
class="form-control"
maxlength="6"
required>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
required>

<label class="form-check-label">

I agree to the

Terms & Conditions

</label>

</div>

<button
type="submit"
class="btn btn-success w-100 btn-register">

<i class="bi bi-person-plus-fill"></i>

Create Account

</button>

</form>

<hr>

<div class="text-center">

Already have an account?

<br><br>

<a
th:href="@{/login}"
class="btn btn-outline-success w-100">

Sign In

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
