<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Upload Clothes | ReWear</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fa;
}

.navbar{
    background:#198754;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.form-control,
.form-select{
    border-radius:12px;
}

.preview{
    width:100%;
    height:320px;
    object-fit:cover;
    border:2px dashed #198754;
    border-radius:15px;
}

.btn-upload{
    border-radius:12px;
    padding:12px;
    font-size:18px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold"
th:href="@{/user-dashboard}">

<i class="bi bi-arrow-left-circle"></i>

Dashboard

</a>

<span class="text-white fw-bold">

Upload Product

</span>

</div>

</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="card">

<div class="card-body p-5">

<h2 class="text-center text-success mb-4">

<i class="bi bi-cloud-upload-fill"></i>

Upload Clothes

</h2>

<form
th:action="@{/saveProduct}"
th:object="${product}"
method="post"
enctype="multipart/form-data">

<!-- Product Name & Brand -->

<div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">Product Name</label>

        <input
            type="text"
            th:field="*{productName}"
            class="form-control"
            placeholder="Enter Product Name"
            required>

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">Brand</label>

        <input
            type="text"
            th:field="*{brand}"
            class="form-control"
            placeholder="Nike, Zara, H&M">

    </div>

</div>

<!-- Category, Gender & Size -->

<div class="row">

    <div class="col-md-4 mb-3">

        <label class="form-label">Category</label>

        <select
            id="category"
            th:field="*{category}"
            class="form-select"
            onchange="updateSize()"
            required>

            <option value="">Select Category</option>
            <option value="Clothing">Clothing</option>
            <option value="Shoes">Shoes</option>
            <option value="Accessories">Accessories</option>
            <option value="Bags">Bags</option>

        </select>

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">Gender</label>

        <select
            id="gender"
            th:field="*{gender}"
            class="form-select"
            onchange="updateSize()"
            required>

            <option value="">Select Gender</option>
            <option value="Men">Men</option>
            <option value="Women">Women</option>
            <option value="Kids">Kids</option>
            <option value="Unisex">Unisex</option>

        </select>

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">Size</label>

        <select
            id="size"
            th:field="*{size}"
            class="form-select"
            required>

            <option value="">Select Size</option>

        </select>

    </div>

</div>

<!-- Color & Material -->

<div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">Color</label>

        <input
            type="text"
            th:field="*{color}"
            class="form-control"
            placeholder="Black, Blue, White">

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">Material</label>

        <select
            th:field="*{material}"
            class="form-select">

            <option value="">Select Material</option>
            <option value="Cotton">Cotton</option>
            <option value="Denim">Denim</option>
            <option value="Polyester">Polyester</option>
            <option value="Leather">Leather</option>
            <option value="Silk">Silk</option>
            <option value="Wool">Wool</option>
            <option value="Linen">Linen</option>

        </select>

    </div>

</div>

<!-- Condition & Purpose -->

<div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">Condition</label>

        <select
            th:field="*{condition}"
            class="form-select"
            required>

            <option value="">Select Condition</option>
            <option value="New">New</option>
            <option value="Like New">Like New</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>

        </select>

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">Purpose</label>

        <select
            th:field="*{purpose}"
            class="form-select"
            required>

            <option value="">Select Purpose</option>
            <option value="Sell">Sell</option>
            <option value="Donate">Donate</option>
            <option value="Exchange">Exchange</option>

        </select>

    </div>

</div>

<!-- Price -->

<div class="mb-3">

    <label class="form-label">Price (₹)</label>

    <input
        type="number"
        th:field="*{price}"
        class="form-control"
        placeholder="Enter Price">

</div>

<!-- Description -->

<div class="mb-3">

    <label class="form-label">Description</label>

    <textarea
        th:field="*{description}"
        rows="4"
        class="form-control"
        placeholder="Write product description..."></textarea>

</div>

<!-- Product Image -->

<div class="mb-3">

    <label class="form-label">Product Image</label>

    <input
        type="file"
        name="imageFile"
        class="form-control"
        accept="image/*"
        required
        onchange="previewImage(event)">

</div>

<!-- Image Preview -->

<div class="text-center mb-4">

    <img
        id="preview"
        class="preview"
        src="https://via.placeholder.com/600x350?text=Image+Preview">

</div>

<!-- Upload Button -->

<div class="d-grid">

    <button
        type="submit"
        class="btn btn-success btn-upload">

        <i class="bi bi-cloud-upload-fill"></i>

        Upload Product

    </button>

</div>

</form>

</div>
</div>
</div>
</div>
</div>

<footer class="mt-5 py-4 bg-light border-top">

    <div class="container text-center">

        <h5 class="text-success">
            ♻ ReWear
        </h5>

        <p class="text-muted">
            Giving Every Thread a Second Life.
        </p>

    </div>

</footer>

<script>

// ================= Image Preview =================

function previewImage(event){

    const reader = new FileReader();

    reader.onload = function(){

        document.getElementById("preview").src = reader.result;

    };

    if(event.target.files.length > 0){
        reader.readAsDataURL(event.target.files[0]);
    }

}


// ================= Dynamic Size =================

function updateSize(){

    const category = document.getElementById("category").value;
    const gender = document.getElementById("gender").value;
    const size = document.getElementById("size");

    size.innerHTML = "";

    let sizes = [];

    // Clothing

    if(category === "Clothing"){

        if(gender === "Men"){

            sizes = ["S","M","L","XL","XXL"];

        }else if(gender === "Women"){

            sizes = ["XS","S","M","L","XL"];

        }else if(gender === "Kids"){

            sizes = ["2Y","4Y","6Y","8Y","10Y","12Y"];

        }else{

            sizes = ["S","M","L","XL"];

        }

    }

    // Shoes

    else if(category === "Shoes"){

        if(gender === "Men"){

            sizes = ["6","7","8","9","10","11","12"];

        }else if(gender === "Women"){

            sizes = ["4","5","6","7","8","9","10"];

        }else if(gender === "Kids"){

            sizes = ["1","2","3","4","5"];

        }else{

            sizes = ["6","7","8","9"];

        }

    }

    // Bags

    else if(category === "Bags"){

        sizes = ["Small","Medium","Large"];

    }

    // Accessories

    else if(category === "Accessories"){

        sizes = ["Free Size"];

    }

    // Default

    if(sizes.length == 0){

        let option = document.createElement("option");
        option.value = "";
        option.text = "Select Size";
        size.appendChild(option);

    }else{

        sizes.forEach(function(item){

            let option = document.createElement("option");

            option.value = item;
            option.text = item;

            size.appendChild(option);

        });

    }

}

window.onload = updateSize;

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
