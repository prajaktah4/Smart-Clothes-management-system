<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Exchange Request | ReWear</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fa;
}

.navbar{
    background:#198754;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.product-img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:15px;
}

.btn-submit{
    background:#198754;
    color:white;
}

.btn-submit:hover{
    background:#157347;
    color:white;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand"
th:href="@{/exchange}">

<i class="bi bi-arrow-left-circle"></i>

Back

</a>

<span class="navbar-text text-white">

Exchange Request

</span>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card">

<div class="row">

<div class="col-md-5 p-4">

<img
th:src="@{'/uploads/' + ${exchange.product.imageName}}"
class="product-img">

<h3 class="mt-3"
th:text="${exchange.product.productName}">
Product
</h3>

<p>

<b>Brand :</b>

<span
th:text="${exchange.product.brand}"></span>

</p>

<p>

<b>Category :</b>

<span
th:text="${exchange.product.category}"></span>

</p>

<p>

<b>Size :</b>

<span
th:text="${exchange.product.size}"></span>

</p>

<p>

<b>Condition :</b>

<span
th:text="${exchange.product.condition}"></span>

</p>

</div>

<div class="col-md-7 p-4">

<h2>

Request Exchange

</h2>

<form
th:action="@{/saveExchange}"
th:object="${exchange}"
method="post">

<input
type="hidden"
th:field="*{product.productId}">

<!-- Requester Name -->

<div class="mb-3">

<label class="form-label">

Your Name

</label>

<input
type="text"
th:field="*{requesterName}"
class="form-control"
placeholder="Enter your full name"
required>

</div>

<!-- Email -->

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
th:field="*{requesterEmail}"
class="form-control"
placeholder="Enter your email"
required>

</div>

<!-- Phone -->

<div class="mb-3">

<label class="form-label">

Phone Number

</label>

<input
type="text"
th:field="*{requesterPhone}"
class="form-control"
placeholder="Enter your phone number"
required>

</div>

<!-- Address -->

<div class="mb-4">

<label class="form-label">

Address

</label>

<textarea
th:field="*{requesterAddress}"
rows="4"
class="form-control"
placeholder="Enter your address"
required></textarea>

</div>

<!-- Status -->

<input
type="hidden"
th:field="*{exchangeStatus}"
value="Pending">

<!-- Buttons -->

<div class="d-grid gap-2">

<button
type="submit"
class="btn btn-submit btn-lg">

<i class="bi bi-arrow-left-right"></i>

Submit Exchange Request

</button>

<a
th:href="@{/exchange}"
class="btn btn-outline-secondary">

<i class="bi bi-arrow-left"></i>

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- Footer -->

<footer class="mt-5">

<div class="container">

<hr>

<div class="row text-center">

<div class="col-md-4">

<h5>

<i class="bi bi-recycle"></i>

ReWear

</h5>

<p>

Giving Every Thread a Second Life.

</p>

</div>

<div class="col-md-4">

<h5>

<i class="bi bi-arrow-repeat"></i>

Exchange

</h5>

<p>

Exchange clothes with trusted users.

</p>

</div>

<div class="col-md-4">

<h5>

<i class="bi bi-shield-check"></i>

Safe & Secure

</h5>

<p>

All exchange requests are verified.

</p>

</div>

</div>

<hr>

<p class="text-center mb-0">

© 2026 ReWear | Smart Clothes Reuse Platform

</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
